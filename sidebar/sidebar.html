<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Notes Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <!-- Header -->
  <header id="sidebar-header">
    <div class="header-brand">
      <img class="header-logo" src="../icons/yuvatech_logo.png" alt="YuvaTech Logo">
      <span class="header-title">Web Notes Assistant</span>
      <button class="autosave-toggle active" id="autosave-toggle">
        <span class="autosave-dot"></span>
        <span class="autosave-text">Autosave on</span>
      </button>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
        <svg class="theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Workspace Selector -->
  <div id="workspace-selector">
    <div class="ws-tabs">
      <button class="ws-tab" id="ws-tab-new">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New Workspace
      </button>
      <button class="ws-tab" id="ws-tab-existing">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Existing
      </button>
    </div>
    <div class="ws-panel" id="ws-panel-new" style="display:none">
      <input type="text" id="workspace-name" value="" spellcheck="false" placeholder="Enter workspace name…" aria-label="Workspace name">
    </div>
    <div class="ws-panel" id="ws-panel-existing" style="display:none">
      <div id="ws-existing-list" class="ws-existing-list">
        <p class="ws-empty-msg">No saved workspaces</p>
      </div>
    </div>
  </div>

  <!-- Capture Controls -->
  <div id="capture-controls">
    <div class="capture-toggle" id="take-notes-toggle">
      <div class="toggle-switch" id="toggle-switch">
        <div class="toggle-knob"></div>
      </div>
      <span class="capture-label">Take Notes</span>
      <span class="capture-status" id="take-notes-status">OFF</span>
    </div>
    <button id="btn-screenshot" class="capture-btn" title="Capture screenshot">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
    <button id="btn-toggle-meta" class="capture-meta-btn active" title="Toggle source & timestamp">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-save" class="toolbar-btn toolbar-btn-primary" title="Save workspace">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
    </button>
    <div class="toolbar-export">
      <span class="toolbar-export-label">Save as</span>
      <button id="btn-export-pdf" class="toolbar-btn" title="Download as PDF">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span>PDF</span>
      </button>
      <button id="btn-export-docx" class="toolbar-btn" title="Download as DOCX">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span>DOCX</span>
      </button>
    </div>
  </div>

  <!-- Notes container -->
  <div id="notes-container">
    <div id="notes-empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <p class="empty-title">No notes yet</p>
      <p class="empty-subtitle">Toggle "Take Notes" on, then highlight<br>text on any webpage to capture it</p>
    </div>
    <div id="notes-list"></div>
  </div>

  <!-- Notes count -->
  <div id="notes-footer">
    <span id="notes-count">0 notes</span>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Note Context Menu -->
  <div id="note-context-menu" class="context-menu" style="display:none">
    <button class="ctx-item" data-action="move-up">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
      Move Up
    </button>
    <button class="ctx-item" data-action="move-down">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      Move Down
    </button>
    <div class="ctx-divider"></div>
    <button class="ctx-item" data-action="keep-style">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      Keep Style
    </button>
    <div class="ctx-divider"></div>
    <button class="ctx-item ctx-item-danger" data-action="delete">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete
    </button>
  </div>

  <!-- Scripts -->
  <script src="../lib/jspdf.umd.min.js"></script>
  <script src="../lib/docx.min.js"></script>
  <script src="../lib/FileSaver.min.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
